name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  API_KEY: ci-test-api-key-not-for-production
  SUPABASE_URL: https://example.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python setup
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run pytest
        run: uv run pytest tests/ -q

  backend-docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: lead-gen-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name api-smoke -p 18000:8000 \
            -e API_KEY=${{ env.API_KEY }} \
            -e SUPABASE_URL=${{ env.SUPABASE_URL }} \
            -e SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }} \
            lead-gen-api:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:18000/api/v1/health && exit 0
            sleep 2
          done
          docker logs api-smoke
          exit 1

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          BACKEND_URL: http://localhost:8000/api/v1
          BACKEND_API_KEY: ci-test-api-key-not-for-production

  frontend-docker:
    name: Frontend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: lead-gen-web:ci
          build-args: |
            BACKEND_URL=http://api:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
