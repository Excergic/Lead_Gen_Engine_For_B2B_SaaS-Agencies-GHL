name: Release & Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python setup
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run pytest
        run: uv run pytest tests/ -q
        env:
          API_KEY: ci-test-api-key-not-for-production
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          BACKEND_URL: http://localhost:8000/api/v1
          BACKEND_API_KEY: ci-test-api-key-not-for-production

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - name: api
            context: .
            file: Dockerfile
            image: lead-gen-api
            build_args: ""
          - name: web
            context: frontend
            file: frontend/Dockerfile
            image: lead-gen-web
            build_args: |
              BACKEND_URL=http://api:8000/api/v1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-vps:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.ENABLE_VPS_DEPLOY == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_OWNER,VPS_DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "${VPS_DEPLOY_PATH}"
            chmod +x scripts/remote-deploy.sh
            ./scripts/remote-deploy.sh

  deploy-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.VERCEL_DEPLOY_IN_CI == 'true'
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # Manual fallback when you need migrations without a full image deploy.
  migrate:
    name: Run Supabase migrations (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run migrations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          uv sync --frozen
          uv run python scripts/run_migrations.py
